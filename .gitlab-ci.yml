stages:
  - mirror
  - maintenance

variables:
  GOLDEN_RETRIEVER_STATE: ".gr/state.json"
  GOLDEN_RETRIEVER_METADATA_CACHE: ".gr/metadata"
  GOLDEN_RETRIEVER_TARBALLS: ".gr/tgzs"
  GOLDEN_RETRIEVER_CI_IMAGE: "$CI_REGISTRY_IMAGE/golden-retriever-ci:go1.24-alpine3.22-node"
  GOLDEN_RETRIEVER_INPUT: "package.json"
  GOLDEN_RETRIEVER_INPUTS: ""
  GOLDEN_RETRIEVER_INPUT_DIRS: "package-jsons,package-locks"
  GOLDEN_RETRIEVER_PROJECT_CONCURRENCY: "4"

cache:
  key: "gr-${CI_PROJECT_ID}-${CI_COMMIT_REF_SLUG}"
  paths:
    - .gr/state.json
    - .gr/metadata/
  policy: pull-push

mirror:npm:
  stage: mirror
  image: "$GOLDEN_RETRIEVER_CI_IMAGE"
  rules:
    - if: '$NPM_TARGET_REGISTRY'
  before_script:
    - node --version
    - npm --version
    - go version
  script:
    - |
      DISCOVERED_INPUTS=""
      OLD_IFS="$IFS"
      IFS=','
      for DIR in $GOLDEN_RETRIEVER_INPUT_DIRS; do
        DIR="$(echo "$DIR" | xargs)"
        [ -z "$DIR" ] && continue
        [ ! -d "$DIR" ] && continue
        FOUND="$(find "$DIR" -type f \( -name 'package.json' -o -name 'package-lock.json' -o -name 'npm-shrinkwrap.json' -o -name '*.package.json' -o -name '*.package-lock.json' \) | sort | tr '\n' ',' | sed 's/,$//')"
        if [ -n "$FOUND" ]; then
          if [ -n "$DISCOVERED_INPUTS" ]; then
            DISCOVERED_INPUTS="${DISCOVERED_INPUTS},${FOUND}"
          else
            DISCOVERED_INPUTS="$FOUND"
          fi
        fi
      done
      IFS="$OLD_IFS"
      if [ -n "$DISCOVERED_INPUTS" ]; then
        GOLDEN_RETRIEVER_INPUTS="$DISCOVERED_INPUTS"
      fi
      echo "golden-retriever inputs: ${GOLDEN_RETRIEVER_INPUTS:-$GOLDEN_RETRIEVER_INPUT}"
      go run ./cmd/golden-retriever mirror --input "$GOLDEN_RETRIEVER_INPUT" --inputs "$GOLDEN_RETRIEVER_INPUTS" --project-concurrency "$GOLDEN_RETRIEVER_PROJECT_CONCURRENCY" --state "$GOLDEN_RETRIEVER_STATE" --metadata-cache "$GOLDEN_RETRIEVER_METADATA_CACHE" --out "$GOLDEN_RETRIEVER_TARBALLS" --target-registry "$NPM_TARGET_REGISTRY"

state:rebuild:
  stage: maintenance
  image: "$GOLDEN_RETRIEVER_CI_IMAGE"
  rules:
    - if: '$NPM_TARGET_REGISTRY'
      when: manual
      allow_failure: false
  before_script:
    - node --version
    - npm --version
    - go version
  script:
    - go run ./cmd/golden-retriever state sync-target --input "$GOLDEN_RETRIEVER_INPUT" --state "$GOLDEN_RETRIEVER_STATE" --metadata-cache "$GOLDEN_RETRIEVER_METADATA_CACHE" --target-registry "$NPM_TARGET_REGISTRY"
