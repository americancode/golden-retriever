stages:
  - mirror
  - maintenance

variables:
  GOLDEN_RETRIEVER_STATE: ".gr/state.json"
  GOLDEN_RETRIEVER_METADATA_CACHE: ".gr/metadata"
  GOLDEN_RETRIEVER_TARBALLS: ".gr/tgzs"
  GOLDEN_RETRIEVER_CI_IMAGE: "$CI_REGISTRY_IMAGE/golden-retriever-ci:go1.25-alpine3.22-node"
  GOLDEN_RETRIEVER_INPUT: "package.json"
  GOLDEN_RETRIEVER_INPUTS: ""
  GOLDEN_RETRIEVER_INPUT_DIRS: "package-jsons,package-locks"
  GOLDEN_RETRIEVER_PROJECT_CONCURRENCY: "4"
  GOLDEN_RETRIEVER_SCAN_ENFORCE: "false"
  GOLDEN_RETRIEVER_SCAN_OSV: "true"
  GOLDEN_RETRIEVER_SCAN_OSV_BATCH_SIZE: "200"
  GOLDEN_RETRIEVER_SCAN_OSV_CONCURRENCY: "8"
  GOLDEN_RETRIEVER_SCAN_MIN_SEVERITY: "high"
  GOLDEN_RETRIEVER_SCAN_UNKNOWN_SEVERITY: "high"
  GOLDEN_RETRIEVER_SCAN_EXCEPTIONS: ".gr/scan-exceptions.json"
  GOLDEN_RETRIEVER_SCAN_BLOCKLIST: ".gr/scan-blocklist.json"
  GOLDEN_RETRIEVER_SCAN_DENY_SCRIPTS: "preinstall,install,postinstall"
  GOLDEN_RETRIEVER_SCAN_REPORT: ".gr/scan-report.json"
  # Optional proxy settings for Go HTTP client and npm subprocess.
  # Set these in GitLab CI/CD variables as needed.
  HTTP_PROXY: ""
  HTTPS_PROXY: ""
  NO_PROXY: ""

cache:
  key: "gr-${CI_PROJECT_ID}-${CI_COMMIT_REF_SLUG}"
  paths:
    - .gr/state.json
    - .gr/metadata/
  policy: pull-push

mirror:npm:
  stage: mirror
  image: "$GOLDEN_RETRIEVER_CI_IMAGE"
  rules:
    - if: '$NPM_TARGET_REGISTRY'
  before_script:
    - node --version
    - npm --version
    - golden-retriever --help >/dev/null
  script:
    - |
      export http_proxy="${HTTP_PROXY}"
      export https_proxy="${HTTPS_PROXY}"
      export no_proxy="${NO_PROXY}"
      DISCOVERED_INPUTS=""
      OLD_IFS="$IFS"
      IFS=','
      for DIR in $GOLDEN_RETRIEVER_INPUT_DIRS; do
        DIR="$(echo "$DIR" | xargs)"
        [ -z "$DIR" ] && continue
        [ ! -d "$DIR" ] && continue
        FOUND="$(find "$DIR" -type f \( -name 'package.json' -o -name 'package-lock.json' -o -name 'npm-shrinkwrap.json' -o -name '*.package.json' -o -name '*.package-lock.json' \) | sort | tr '\n' ',' | sed 's/,$//')"
        if [ -n "$FOUND" ]; then
          if [ -n "$DISCOVERED_INPUTS" ]; then
            DISCOVERED_INPUTS="${DISCOVERED_INPUTS},${FOUND}"
          else
            DISCOVERED_INPUTS="$FOUND"
          fi
        fi
      done
      IFS="$OLD_IFS"
      if [ -n "$DISCOVERED_INPUTS" ]; then
        GOLDEN_RETRIEVER_INPUTS="$DISCOVERED_INPUTS"
      fi
      echo "golden-retriever inputs: ${GOLDEN_RETRIEVER_INPUTS:-$GOLDEN_RETRIEVER_INPUT}"
      golden-retriever mirror --input "$GOLDEN_RETRIEVER_INPUT" --inputs "$GOLDEN_RETRIEVER_INPUTS" --project-concurrency "$GOLDEN_RETRIEVER_PROJECT_CONCURRENCY" --state "$GOLDEN_RETRIEVER_STATE" --metadata-cache "$GOLDEN_RETRIEVER_METADATA_CACHE" --out "$GOLDEN_RETRIEVER_TARBALLS" --target-registry "$NPM_TARGET_REGISTRY" --scan-enforce="$GOLDEN_RETRIEVER_SCAN_ENFORCE" --scan-osv="$GOLDEN_RETRIEVER_SCAN_OSV" --scan-osv-batch-size="$GOLDEN_RETRIEVER_SCAN_OSV_BATCH_SIZE" --scan-osv-concurrency="$GOLDEN_RETRIEVER_SCAN_OSV_CONCURRENCY" --scan-min-severity="$GOLDEN_RETRIEVER_SCAN_MIN_SEVERITY" --scan-unknown-severity="$GOLDEN_RETRIEVER_SCAN_UNKNOWN_SEVERITY" --scan-exceptions="$GOLDEN_RETRIEVER_SCAN_EXCEPTIONS" --scan-blocklist="$GOLDEN_RETRIEVER_SCAN_BLOCKLIST" --scan-deny-scripts="$GOLDEN_RETRIEVER_SCAN_DENY_SCRIPTS" --scan-report "$GOLDEN_RETRIEVER_SCAN_REPORT"
  artifacts:
    when: always
    paths:
      - .gr/scan-report.json
    expire_in: 7 days

state:rebuild:
  stage: maintenance
  image: "$GOLDEN_RETRIEVER_CI_IMAGE"
  rules:
    - if: '$NPM_TARGET_REGISTRY'
      when: manual
      allow_failure: false
  before_script:
    - node --version
    - npm --version
    - golden-retriever --help >/dev/null
  script:
    - golden-retriever state sync-target --input "$GOLDEN_RETRIEVER_INPUT" --state "$GOLDEN_RETRIEVER_STATE" --metadata-cache "$GOLDEN_RETRIEVER_METADATA_CACHE" --target-registry "$NPM_TARGET_REGISTRY"

rescan:target:
  stage: maintenance
  image: "$GOLDEN_RETRIEVER_CI_IMAGE"
  rules:
    - if: '$NPM_TARGET_REGISTRY && $CI_PIPELINE_SOURCE == "schedule"'
    - if: '$NPM_TARGET_REGISTRY'
      when: manual
      allow_failure: false
  before_script:
    - node --version
    - npm --version
    - golden-retriever --help >/dev/null
  script:
    - golden-retriever state sync-target --input "$GOLDEN_RETRIEVER_INPUT" --state "$GOLDEN_RETRIEVER_STATE" --metadata-cache "$GOLDEN_RETRIEVER_METADATA_CACHE" --target-registry "$NPM_TARGET_REGISTRY"
    - golden-retriever scan --state "$GOLDEN_RETRIEVER_STATE" --source target --osv="$GOLDEN_RETRIEVER_SCAN_OSV" --osv-batch-size "$GOLDEN_RETRIEVER_SCAN_OSV_BATCH_SIZE" --osv-concurrency "$GOLDEN_RETRIEVER_SCAN_OSV_CONCURRENCY" --min-severity "$GOLDEN_RETRIEVER_SCAN_MIN_SEVERITY" --unknown-severity "$GOLDEN_RETRIEVER_SCAN_UNKNOWN_SEVERITY" --exceptions "$GOLDEN_RETRIEVER_SCAN_EXCEPTIONS" --report "$GOLDEN_RETRIEVER_SCAN_REPORT"
  artifacts:
    when: always
    paths:
      - .gr/scan-report.json
      - .gr/state.json
    expire_in: 7 days
